<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>We Masau Loan Request Portal</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }\n        header { background: #35424a; color: #ffffff; padding: 20px; text-align: center; }\n        form { margin: 20px; padding: 20px; background: #ffffff; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }\n        input[type="text"], input[type="email"], input[type="number"], select, button { width: 100%; padding: 10px; margin: 10px 0; }\n        button { background: #35424a; color: white; border: none; cursor: pointer; }\n        button:hover { background: #e8491d; }\n        .admin-panel { margin: 20px; padding: 20px; background: #ffffff; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Welcome to We Masau Loan Request Portal</h1>\n    </header>\n    <main>\n        <h2>Loan Application Form</h2>\n        <form id="loanForm">\n            <label for="name">Full Name:</label>\n            <input type="text" id="name" required>\n            <label for="email">Email:</label>\n            <input type="email" id="email" required>\n            <label for="amount">Loan Amount:</label>\n            <input type="number" id="amount" required>\n            <label for="reason">Reason for Loan:</label>\n            <textarea id="reason" rows="4" required></textarea>\n            <button type="submit">Submit Application</button>\n        </form>\n        <div class="admin-panel">\n            <h2>Admin Panel</h2>\n            <label for="applicationId">Application ID:</label>\n            <input type="number" id="applicationId">\n            <button onclick="approveApplication()">Approve</button>\n            <button onclick="denyApplication()">Deny</button>\n        </div>\n    </main>\n    <script>\n        document.getElementById('loanForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            // Logic to handle Loan Application submission\n            alert('Loan Application Submitted!');\n            // Here, you would typically send the data to the server.\n        });\n        function approveApplication() {\n            const appId = document.getElementById('applicationId').value;\n            // Logic to approve the application with ID appId\n            alert('Application ID ' + appId + ' approved!');\n        }\n        function denyApplication() {\n            const appId = document.getElementById('applicationId').value;\n            // Logic to deny the application with ID appId\n            alert('Application ID ' + appId + ' denied!');\n        }\n    </script>\n</body>\n</html>\n
