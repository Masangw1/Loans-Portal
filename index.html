<script>
    // ======================== CONFIGURATION ========================
    const EMAIL_CONFIG = {
        PUBLIC_KEY: "fuNbY5M2Bu6uWKglV",
        SERVICE_ID: "service_sswtll7",
        ADMIN_TEMPLATE: "template_p79eqjs",
        REPLY_TEMPLATE: "template_ujw8qql"
    };
    const ADMIN_EMAIL_RECIPIENTS = [
        "mmasangwi@gmail.com",
        "marvin@wemasau.org",
        "emmanuel@wemasau.org",
        "levie@wemasau.org",
        "chifundo@wemasau.org",
        "joseph@wemasau.org",
        "willy@wemasau.org",
        "amos@wemasau.org"
    ];
    const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycby34FkwYW5NuC8Di31fLUuz7VizR7FLNmJ7_cPuxgyh7RKA81lsapSwtbcPOxCZKGjm/exec";
    
    let emailjsReady = false;
    try {
        emailjs.init(EMAIL_CONFIG.PUBLIC_KEY);
        emailjsReady = true;
    } catch(e) { console.warn("EmailJS init failed", e); }

    let currentCommitteeMember = null;
    let adminPanelVisible = false;
    let allApplications = [];
    let usingFallback = false;

    // ---------- localStorage fallback ----------
    function getAllAppsLocal() {
        const raw = localStorage.getItem('wemasau_loans');
        return raw ? JSON.parse(raw) : [];
    }
    function saveAppToLocal(app) {
        const apps = getAllAppsLocal();
        apps.push(app);
        localStorage.setItem('wemasau_loans', JSON.stringify(apps));
    }
    function updateLocalStatus(appId, updatedFields) {
        const apps = getAllAppsLocal();
        const index = apps.findIndex(a => a.applicationId === appId);
        if (index !== -1) {
            Object.assign(apps[index], updatedFields);
            localStorage.setItem('wemasau_loans', JSON.stringify(apps));
        }
    }

    // ---------- Google Sheets fetch ----------
    async function fetchApplicationsFromSheet() {
        if (!GOOGLE_SHEETS_URL || GOOGLE_SHEETS_URL.includes("YOUR_DEPLOYED_ID")) {
            usingFallback = true;
            return getAllAppsLocal();
        }
        try {
            console.log("Fetching from:", GOOGLE_SHEETS_URL);
            const response = await fetch(GOOGLE_SHEETS_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (Array.isArray(data)) {
                allApplications = data;
                usingFallback = false;
                return allApplications;
            } else {
                throw new Error("Invalid data format");
            }
        } catch (err) {
            console.error("Fetch error:", err);
            document.getElementById('applicationsList').innerHTML = `<div style="text-align:center; padding:40px; color:#e03a3a;">⚠️ Could not load from Google Sheets: ${err.message}<br>Using local storage (this device only).</div>`;
            usingFallback = true;
            return getAllAppsLocal();
        }
    }

    // Send new application to Google Sheets
    async function addApplicationToSheet(appData) {
        if (usingFallback) {
            saveAppToLocal(appData);
            return true;
        }
        try {
            const response = await fetch(GOOGLE_SHEETS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(appData)
            });
            const result = await response.json();
            if (!response.ok || result.error) throw new Error(result.error || "HTTP error");
            return true;
        } catch (err) {
            console.error("Add to sheet failed:", err);
            showStatusMsg(`❌ Failed to save to Google Sheets: ${err.message}. Data saved locally only.`, "error");
            saveAppToLocal(appData);
            return false;
        }
    }

    // Update decision using applicationId
    async function sendUpdateToSheet(applicationId, updatedFields) {
        if (usingFallback) {
            updateLocalStatus(applicationId, updatedFields);
            return true;
        }
        try {
            const payload = { update: true, applicationId: applicationId, ...updatedFields };
            const response = await fetch(GOOGLE_SHEETS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || "Update failed");
            return true;
        } catch (err) {
            console.error("Update failed:", err);
            return false;
        }
    }

    // ---------- Email functions ----------
    async function notifyAdminViaEmail(application) {
        if (!emailjsReady) return false;
        const paramsBase = {
            applicant_name: application.fullName,
            applicant_email: application.email,
            loan_amount: application.loanAmount,
            loan_type: application.loanType,
            member_id: application.memberId,
            purpose: application.purpose.substring(0, 200),
            submission_date: new Date().toLocaleString()
        };
        let successCount = 0;
        for (const adminEmail of ADMIN_EMAIL_RECIPIENTS) {
            try {
                await emailjs.send(EMAIL_CONFIG.SERVICE_ID, EMAIL_CONFIG.ADMIN_TEMPLATE, { ...paramsBase, to_email: adminEmail });
                successCount++;
            } catch (err) { console.error(err); }
        }
        return successCount > 0;
    }

    async function sendDecisionEmail(application, decision, adminMessage, statusDivId) {
        if (!emailjsReady) {
            showStatusMsg("❌ EmailJS not ready.", "error", statusDivId);
            return false;
        }
        if (!application.email) {
            showStatusMsg("❌ Applicant email missing.", "error", statusDivId);
            return false;
        }
        try {
            await emailjs.send(EMAIL_CONFIG.SERVICE_ID, EMAIL_CONFIG.REPLY_TEMPLATE, {
                to_email: application.email,
                applicant_name: application.fullName,
                decision: decision,
                admin_remarks: adminMessage,
                loan_amount: application.loanAmount,
                member_id: application.memberId
            });
            showStatusMsg(`✅ Email sent to ${application.email}`, "success", statusDivId);
            return true;
        } catch (err) {
            showStatusMsg(`❌ Email failed: ${err.text || err.message}`, "error", statusDivId);
            return false;
        }
    }

    // ---------- Helper functions ----------
    function showStatusMsg(message, type, targetId = "formStatus") {
        const el = document.getElementById(targetId);
        if (el) {
            el.textContent = message;
            el.className = `status ${type}`;
            setTimeout(() => { if(el) el.className = 'status'; }, 5000);
        } else { alert(message); }
    }

    function formatNumber(num) { return num ? Number(num).toLocaleString() : '0'; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ---------- Render admin list ----------
    async function renderAdminList() {
        const apps = await fetchApplicationsFromSheet();  // FIXED: was calling sendUpdateToSheet incorrectly
        const container = document.getElementById('applicationsList');
        if (!container) return;
        if (!apps.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">✨ No applications yet. Submit a loan request to see it here.</div>';
            return;
        }
        let html = '';
        apps.forEach((app, idx) => {
            const safeName = escapeHtml(app.fullName || 'N/A');
            const safeId = escapeHtml(app.memberId || 'N/A');
            const loanTypeDisplay = app.loanType || '—';
            const decisionStatus = app.decision ? `<span class="badge-sm" style="background:#d1fae5;">${app.decision}</span>` : '<span class="badge-sm">Pending</span>';
            const approvalInfo = app.approvedBy ? `<br><span class="badge-sm">✔️ ${escapeHtml(app.approvedBy)} (${app.approvedByRole}) on ${new Date(app.approvalDate).toLocaleString()}</span>` : '';
            html += `
                <div class="loan-card" data-idx="${idx}">
                    <div class="flex-between">
                        <h4>👤 ${safeName} <span style="font-weight:normal;">(ID: ${safeId})</span></h4>
                        <div>${decisionStatus}${approvalInfo}</div>
                    </div>
                    <div class="details-grid">
                        <span>📧 ${escapeHtml(app.email)}</span>
                        <span>📞 ${escapeHtml(app.phone)}</span>
                        <span>💰 MWK ${formatNumber(app.loanAmount)} | ${app.loanTerm} months</span>
                        <span>🏷️ ${loanTypeDisplay}</span>
                        <span>💵 Income: MWK ${formatNumber(app.monthlyIncome)} | Expenses: ${formatNumber(app.monthlyExpenses)}</span>
                        <span>🤝 Guarantors: ${escapeHtml(app.guarantor1Name)} , ${escapeHtml(app.guarantor2Name)}</span>
                    </div>
                    <div class="reply-toolbar" id="replyToolbar-${idx}">
                        <select id="decision-${idx}" style="width:auto; min-width:150px;">
                            <option value="Approved">✅ Approved</option>
                            <option value="Rejected">❌ Rejected</option>
                            <option value="More Info Required">🔄 More Info Needed</option>
                        </select>
                        <textarea id="replyMsg-${idx}" rows="2" placeholder="Write your decision message or remarks..."></textarea>
                        <button class="sendReplyBtn" data-idx="${idx}">✉️ Send Decision Email & Record</button>
                    </div>
                    <div id="replyLocalStatus-${idx}" style="font-size:12px; margin-top:8px;"></div>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.sendReplyBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const idx = btn.getAttribute('data-idx');
                const appsFresh = await fetchApplicationsFromSheet();
                const application = appsFresh[idx];
                if (!application) return;
                if (!currentCommitteeMember) {
                    showStatusMsg("You are not logged in.", "error", `replyLocalStatus-${idx}`);
                    return;
                }
                const decisionSelect = document.getElementById(`decision-${idx}`);
                const decision = decisionSelect ? decisionSelect.value : 'Approved';
                const replyMsg = document.getElementById(`replyMsg-${idx}`).value.trim();
                if (!replyMsg) {
                    showStatusMsg("Please write a reply message.", "error", `replyLocalStatus-${idx}`);
                    return;
                }
                const statusDivId = `replyLocalStatus-${idx}`;
                const statusDiv = document.getElementById(statusDivId);
                if (statusDiv) statusDiv.innerHTML = '<span class="badge-sm">⏳ Sending...</span>';

                const updatedFields = {
                    decision: decision,
                    decisionRemarks: replyMsg,
                    approvedBy: currentCommitteeMember.name,
                    approvedByRole: currentCommitteeMember.role,
                    approvalDate: new Date().toISOString()
                };
                // Use application.applicationId if available, otherwise fallback to idx
                const appId = application.applicationId || idx;
                await sendUpdateToSheet(appId, updatedFields);

                const emailOk = await sendDecisionEmail(application, decision, replyMsg, statusDivId);
                if (emailOk && statusDiv) statusDiv.innerHTML = '<span class="badge-sm" style="background:#d1fae5;">✅ Updated & emailed</span>';
                else if (statusDiv) statusDiv.innerHTML = '<span class="badge-sm" style="background:#fee2e2;">⚠️ Updated but email failed</span>';
                setTimeout(() => { if(statusDiv) statusDiv.innerHTML = ''; }, 5000);
                await renderAdminList();
            });
        });
    }

    // ---------- Form submission ----------
    document.getElementById('loanForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!document.getElementById('agreeTerms').checked || !document.getElementById('agreeVerification').checked || !document.getElementById('agreePolicy').checked) {
            showStatusMsg("Please accept all terms.", "error");
            return;
        }
        const purposeVal = document.getElementById('purpose').value.trim();
        if (purposeVal.length < 50) {
            showStatusMsg("Purpose must be at least 50 characters.", "error");
            return;
        }
        let loanTypeVal = document.getElementById('loanType').value;
        if (loanTypeVal === 'Other') {
            const otherSpec = document.getElementById('otherLoanType').value.trim();
            loanTypeVal = otherSpec ? `Other: ${otherSpec}` : 'Other (unspecified)';
        }
        const existingLoanVal = document.getElementById('existingLoans').value;
        const existingBalanceVal = existingLoanVal === 'Yes' ? document.getElementById('existingBalance').value : '';
        const appData = {
            applicationId: Date.now() + '-' + Math.random().toString(36).substr(2, 8),  // ADDED unique ID
            timestamp: new Date().toISOString(),
            fullName: document.getElementById('fullName').value.trim(),
            memberId: document.getElementById('memberId').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            joinDate: document.getElementById('joinDate').value,
            membershipStatus: document.getElementById('membershipStatus').value,
            loanType: loanTypeVal,
            loanAmount: document.getElementById('loanAmount').value,
            loanTerm: document.getElementById('loanTerm').value,
            repaymentMethod: document.getElementById('repaymentMethod').value,
            disbursementDate: document.getElementById('disbursementDate').value,
            purpose: purposeVal,
            monthlyIncome: document.getElementById('monthlyIncome').value,
            monthlyExpenses: document.getElementById('monthlyExpenses').value,
            employmentStatus: document.getElementById('employmentStatus').value,
            employer: document.getElementById('employer').value,
            yearsEmployed: document.getElementById('yearsEmployed').value,
            existingLoans: existingLoanVal,
            existingBalance: existingBalanceVal,
            guarantor1Name: document.getElementById('guarantor1Name').value.trim(),
            guarantor1Phone: document.getElementById('guarantor1Phone').value.trim(),
            guarantor2Name: document.getElementById('guarantor2Name').value.trim(),
            guarantor2Phone: document.getElementById('guarantor2Phone').value.trim(),
            decision: null,
            decisionRemarks: null,
            approvedBy: null,
            approvedByRole: null,
            approvalDate: null
        };
        if (!appData.guarantor1Name || !appData.guarantor1Phone || !appData.guarantor2Name || !appData.guarantor2Phone) {
            showStatusMsg("Both guarantors are required.", "error");
            return;
        }
        await addApplicationToSheet(appData);
        showStatusMsg("✅ Application saved! Committee will review.", "success");
        if (emailjsReady && ADMIN_EMAIL_RECIPIENTS.length) await notifyAdminViaEmail(appData);
        document.getElementById('loanForm').reset();
        document.getElementById('otherLoanGroup').style.display = 'none';
        document.getElementById('existingBalanceGroup').style.display = 'none';
        document.getElementById('purposeWarning').style.display = 'none';
        if (adminPanelVisible) await renderAdminList();
    });

    // ---------- Admin login/logout ----------
    const adminPanelDiv = document.getElementById('adminPanel');
    const loginModal = document.getElementById('loginModal');
    const loginBtn = document.getElementById('loginBtn');
    const closeLoginBtn = document.getElementById('closeLoginBtn');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const loggedInUserBadge = document.getElementById('loggedInUserBadge');

    function showLoginModal() { loginModal.style.display = 'flex'; loginUsername.value = ''; loginPassword.value = ''; loginError.innerText = ''; }
    function hideLoginModal() { loginModal.style.display = 'none'; }
    function updateLoggedInBadge() { loggedInUserBadge.innerText = currentCommitteeMember ? `👤 ${currentCommitteeMember.name} (${currentCommitteeMember.role})` : ''; }

    document.getElementById('toggleAdminBtn').addEventListener('click', showLoginModal);
    loginBtn.addEventListener('click', () => {
        const username = loginUsername.value.trim().toLowerCase();
        const password = loginPassword.value;
        const users = JSON.parse(localStorage.getItem('committeeUsers') || '[]');
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentCommitteeMember = { username: user.username, name: user.name, role: user.role };
            hideLoginModal();
            adminPanelDiv.style.display = 'block';
            adminPanelVisible = true;
            renderAdminList();
            updateLoggedInBadge();
            showStatusMsg(`Welcome, ${user.name} (${user.role})`, "success");
        } else {
            loginError.innerText = "Invalid username or password.";
        }
    });
    closeLoginBtn.addEventListener('click', hideLoginModal);
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        currentCommitteeMember = null;
        adminPanelDiv.style.display = 'none';
        adminPanelVisible = false;
        updateLoggedInBadge();
        showStatusMsg("Logged out.", "info");
    });
    document.getElementById('refreshAdminBtn')?.addEventListener('click', async () => { if(adminPanelVisible) await renderAdminList(); });
    document.getElementById('exportBtn')?.addEventListener('click', async () => {
        const apps = await fetchApplicationsFromSheet();
        if (!apps.length) { showStatusMsg("No data to export", "error"); return; }
        const headers = ['timestamp','fullName','memberId','email','phone','joinDate','membershipStatus','loanType','loanAmount','loanTerm','repaymentMethod','disbursementDate','purpose','monthlyIncome','monthlyExpenses','employmentStatus','employer','yearsEmployed','existingLoans','existingBalance','guarantor1Name','guarantor1Phone','guarantor2Name','guarantor2Phone','decision','decisionRemarks','approvedBy','approvedByRole','approvalDate'];
        let rows = [headers.join(',')];
        for (let app of apps) {
            let row = headers.map(h => {
                let val = app[h] !== undefined && app[h] !== null ? app[h] : '';
                if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) val = `"${val.replace(/"/g, '""')}"`;
                return val;
            });
            rows.push(row.join(','));
        }
        const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `wemasau_loans_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showStatusMsg("CSV exported successfully", "success");
    });
    document.getElementById('exportAdminCsvBtn')?.addEventListener('click', async () => {
        const apps = await fetchApplicationsFromSheet();
        if (!apps.length) { showStatusMsg("No data to export", "error"); return; }
        const headers = ['timestamp','fullName','memberId','email','phone','joinDate','membershipStatus','loanType','loanAmount','loanTerm','repaymentMethod','disbursementDate','purpose','monthlyIncome','monthlyExpenses','employmentStatus','employer','yearsEmployed','existingLoans','existingBalance','guarantor1Name','guarantor1Phone','guarantor2Name','guarantor2Phone','decision','decisionRemarks','approvedBy','approvedByRole','approvalDate'];
        let rows = [headers.join(',')];
        for (let app of apps) {
            let row = headers.map(h => {
                let val = app[h] !== undefined && app[h] !== null ? app[h] : '';
                if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) val = `"${val.replace(/"/g, '""')}"`;
                return val;
            });
            rows.push(row.join(','));
        }
        const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `wemasau_loans_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showStatusMsg("CSV exported successfully", "success");
    });

    // UI helpers
    document.getElementById('loanType').addEventListener('change', function() {
        document.getElementById('otherLoanGroup').style.display = this.value === 'Other' ? 'block' : 'none';
    });
    document.getElementById('existingLoans').addEventListener('change', function() {
        document.getElementById('existingBalanceGroup').style.display = this.value === 'Yes' ? 'block' : 'none';
    });
    const purposeField = document.getElementById('purpose');
    purposeField.addEventListener('input', () => {
        const warn = document.getElementById('purposeWarning');
        warn.style.display = (purposeField.value.length < 50 && purposeField.value.length > 0) ? 'inline-block' : 'none';
    });
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('disbursementDate').setAttribute('min', today);
    const loanAmountInput = document.getElementById('loanAmount');
    loanAmountInput.addEventListener('input', () => {
        const amount = parseFloat(loanAmountInput.value);
        const termSelect = document.getElementById('loanTerm');
        if (isNaN(amount) || amount < 0) termSelect.value = "1";
        else {
            let inst = 1;
            if (amount <= 250999.99) inst = 1;
            else if (amount <= 600999.99) inst = 2;
            else if (amount <= 800999.99) inst = 3;
            else if (amount <= 1000999.99) inst = 3.5;
            else if (amount <= 1500999.99) inst = 4;
            else if (amount <= 2000999.99) inst = 4.5;
            else if (amount <= 3000000) inst = 5;
            termSelect.value = inst.toString();
        }
    });
    function initCommitteeUsers() {
        if (!localStorage.getItem('committeeUsers')) {
            localStorage.setItem('committeeUsers', JSON.stringify([
                { username: "harry", password: "chair26", name: "Harry Mononga", role: "Chairman" },
                { username: "marvin", password: "treas26", name: "Marvin Masangwi", role: "Treasurer" },
                { username: "emmanuel", password: "masau2026", name: "Emmanuel Kusunzi", role: "Member 1" },
                { username: "levie", password: "masau2026", name: "Levie Sezza", role: "Member 2" },
                { username: "chifundo", password: "masau2026", name: "Chifundo Lodzeni", role: "Member 3" },
                { username: "joseph", password: "masau2026", name: "Joseph Mononga", role: "Member 4" },
                { username: "willy", password: "masau2026", name: "Willy Chibambo", role: "Member 5" },
                { username: "amos", password: "patron26", name: "Amos Tizora", role: "Patron" }
            ]));
        }
    }
    initCommitteeUsers();
    window.addEventListener('load', () => { if (!emailjsReady) console.log("ℹ️ EmailJS not ready"); });
</script>
