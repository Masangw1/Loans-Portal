<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>We Masau Loan Portal</title>
</head>
<body>
    <header>
        <h1>Welcome to the We Masau Loan Portal</h1>
    </header>
    <main>
        <section>
            <h2>Loan Application Form</h2>
            <form action="/submit-loan-application" method="POST">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="amount">Loan Amount:</label>
                <input type="number" id="amount" name="amount" required>
                <label for="duration">Loan Duration (months):</label>
                <input type="number" id="duration" name="duration" required>
                <input type="submit" value="Apply Now">
            </form>
        </section>
        <section>
            <h2>Committee Panel</h2>
            <p>Meet our committee panel members who review your applications.</p>
            <ul>
                <li>John Doe - Finance Manager</li>
                <li>Jane Smith - Loan Officer</li>
                <li>Bill Jones - Customer Service</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>Contact us at <a href="mailto:support@masau.com">support@masau.com</a></p>
    </footer>
</body>
</html>
